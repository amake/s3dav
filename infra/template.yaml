AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal DAV-to-S3 gateway on Lambda and API Gateway HTTP API

Parameters:
  ServiceName:
    Type: String
    Default: dav-s3-gateway
  ArtifactBucket:
    Type: String
  ArtifactKey:
    Type: String
  DomainName:
    Type: String
  CertificateArn:
    Type: String
  HostedZoneId:
    Type: String
    Default: ''
  S3Bucket:
    Type: String
  S3Region:
    Type: String
  S3Prefix:
    Type: String
  AuthUsername:
    Type: String
  AuthPassword:
    Type: String
    NoEcho: true
  MaxObjectSizeBytes:
    Type: Number
    Default: 5242880

Conditions:
  CreateDnsRecord: !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  GatewayFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${S3Bucket}/${S3Prefix}*

  GatewayFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref ServiceName
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Role: !GetAtt GatewayFunctionRole.Arn
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          S3_REGION: !Ref S3Region
          S3_BUCKET: !Ref S3Bucket
          S3_PREFIX: !Ref S3Prefix
          AUTH_MODE: basic
          AUTH_USERNAME: !Ref AuthUsername
          AUTH_PASSWORD: !Ref AuthPassword
          MAX_OBJECT_SIZE_BYTES: !Ref MaxObjectSizeBytes
          HEALTHCHECK_ENABLED: true

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ServiceName}-http
      ProtocolType: HTTP

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GatewayFunction.Arn
      PayloadFormatVersion: '2.0'

  AnyProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /{proxy+}
      Target: !Sub integrations/${LambdaIntegration}

  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /
      Target: !Sub integrations/${LambdaIntegration}

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GatewayFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

  Domain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref Domain
      Stage: !Ref ApiStage

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateDnsRecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Domain.RegionalDomainName
        HostedZoneId: !GetAtt Domain.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Value: !GetAtt HttpApi.ApiEndpoint
  CustomDomain:
    Value: !Ref DomainName
